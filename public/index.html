<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EventHub — Register for Events</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d14;--surface:#16161f;--surface2:#1e1e2b;--border:#252535;
  --accent:#7c6cf0;--accent2:#a78bfa;--text:#e2e2e8;--muted:#666;
  --success:#22c55e;--danger:#ef4444;--warn:#f59e0b;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── Nav ── */
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100}
.logo{font-size:1.2rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;cursor:pointer}
.nav-links{display:flex;gap:8px;align-items:center}
.nav-btn{background:none;border:none;color:var(--muted);font-size:0.88rem;padding:6px 12px;border-radius:8px;cursor:pointer;transition:color .2s}
.nav-btn:hover,.nav-btn.active{color:var(--text);background:var(--surface2)}
.btn{border:none;border-radius:10px;padding:9px 18px;font-size:0.88rem;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:6px 12px;font-size:0.8rem}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ── Layout ── */
main{max-width:1100px;margin:0 auto;padding:32px 16px}
.page{display:none}.page.active{display:block}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}

/* ── Event card ── */
.event-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .2s,transform .2s}
.event-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.event-card-body{padding:20px;flex:1}
.event-card h3{font-size:1rem;margin-bottom:8px}
.event-card .meta{color:var(--muted);font-size:0.78rem;display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.event-card .meta span::before{margin-right:5px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.72rem;font-weight:600}
.badge-tech{background:#1e1e4a;color:#a78bfa}
.badge-edu{background:#1a2e1a;color:#4ade80}
.badge-net{background:#2a1f10;color:#fb923c}
.badge-gen{background:#1e2a2a;color:#67e8f9}
.badge-full{background:#3a1a1a;color:#f87171}
.price-tag{font-size:0.82rem;font-weight:700;color:var(--accent2)}
.event-card-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.spots{font-size:0.75rem;color:var(--muted)}
.spots.danger{color:var(--danger)}

/* ── Event detail ── */
.detail-header{margin-bottom:24px}
.detail-header h1{font-size:1.8rem;margin-bottom:12px}
.detail-meta{display:flex;flex-wrap:wrap;gap:12px;color:var(--muted);font-size:0.88rem;margin-bottom:20px}
.detail-meta span{background:var(--surface2);padding:5px 12px;border-radius:8px}
.detail-body{display:grid;grid-template-columns:1fr 320px;gap:24px}
@media(max-width:700px){.detail-body{grid-template-columns:1fr}}
.sidebar-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;align-self:start}
.price-big{font-size:2rem;font-weight:700;color:var(--accent2);margin-bottom:16px}

/* ── Auth forms ── */
.auth-wrap{max-width:420px;margin:60px auto}
.auth-wrap h2{text-align:center;margin-bottom:24px;font-size:1.4rem}
.tabs{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:28px}
.tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:0.88rem;background:transparent;border:none;color:var(--muted);transition:background .2s,color .2s}
.tab.active{background:var(--accent);color:#fff}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:0.82rem;color:var(--muted);margin-bottom:6px}
input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:0.92rem;outline:none;transition:border-color .2s;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:90px}
select option{background:var(--surface)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── My registrations ── */
.reg-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.reg-info h4{font-size:0.95rem;margin-bottom:6px}
.reg-info .sub{color:var(--muted);font-size:0.8rem}
.status-pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.72rem;font-weight:600}
.status-confirmed{background:#1a2e1a;color:#4ade80}
.status-cancelled{background:#2a1a1a;color:#f87171}

/* ── Organizer panel ── */
.panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:28px}
.stat-box{background:var(--surface2);border-radius:12px;padding:18px;text-align:center}
.stat-box .num{font-size:2rem;font-weight:700;color:var(--accent2)}
.stat-box .lbl{font-size:0.78rem;color:var(--muted);margin-top:4px}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 14px;text-align:left;font-size:0.83rem;border-bottom:1px solid var(--border)}
th{color:var(--muted);font-weight:600}
td{color:var(--text)}

/* ── Alerts ── */
.alert{border-radius:10px;padding:12px 16px;font-size:0.85rem;margin-bottom:16px}
.alert-error{background:#2a1a1a;color:#f87171;border:1px solid #3a1a1a}
.alert-success{background:#1a2a1a;color:#4ade80;border:1px solid #1a3a1a}

/* ── Filter bar ── */
.filter-bar{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.filter-bar input{flex:1;min-width:180px}
.filter-bar select{width:160px}

/* ── Misc ── */
.empty{text-align:center;color:var(--muted);padding:48px;font-size:0.9rem}
.back-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.88rem;margin-bottom:20px;padding:0;display:flex;align-items:center;gap:4px}
.back-btn:hover{color:var(--text)}
.sep{height:1px;background:var(--border);margin:20px 0}
.spinner{text-align:center;padding:48px;color:var(--muted)}
</style>
</head>
<body>

<nav>
  <span class="logo" onclick="showPage('events')">⚡ EventHub</span>
  <div class="nav-links" id="navLinks">
    <button class="nav-btn active" onclick="showPage('events')">Events</button>
    <span id="authNav"></span>
  </div>
</nav>

<main>
  <!-- ── Events List ─────────────────────────────────── -->
  <div id="page-events" class="page active">
    <h2 style="margin-bottom:20px">Upcoming Events</h2>
    <div class="filter-bar">
      <input type="text" id="searchInput" placeholder="Search events…" oninput="filterEvents()"/>
      <select id="catFilter" onchange="filterEvents()">
        <option value="">All Categories</option>
        <option>Technology</option><option>Education</option>
        <option>Networking</option><option>General</option>
      </select>
      <label style="display:flex;align-items:center;gap:6px;font-size:0.83rem;color:var(--muted)">
        <input type="checkbox" id="upcomingOnly" onchange="filterEvents()" style="width:auto"/> Upcoming only
      </label>
    </div>
    <div class="grid" id="eventGrid"><div class="spinner">Loading events…</div></div>
  </div>

  <!-- ── Event Detail ────────────────────────────────── -->
  <div id="page-detail" class="page">
    <button class="back-btn" onclick="showPage('events')">← Back to Events</button>
    <div id="detailContent"></div>
  </div>

  <!-- ── Auth ───────────────────────────────────────── -->
  <div id="page-auth" class="page">
    <div class="auth-wrap">
      <h2>Welcome to EventHub</h2>
      <div class="tabs">
        <button class="tab active" id="tabLogin" onclick="switchTab('login')">Login</button>
        <button class="tab" id="tabReg" onclick="switchTab('register')">Register</button>
      </div>
      <div id="authAlert"></div>

      <!-- Login form -->
      <div id="loginForm">
        <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="you@example.com"/></div>
        <div class="form-group"><label>Password</label><input type="password" id="loginPwd" placeholder="Password"/></div>
        <button class="btn btn-primary" style="width:100%" onclick="login()">Login</button>
        <p style="text-align:center;font-size:0.78rem;color:var(--muted);margin-top:16px">
          Demo: user@demo.com / user123 &nbsp;·&nbsp; organizer@demo.com / organizer123
        </p>
      </div>

      <!-- Register form -->
      <div id="registerForm" style="display:none">
        <div class="form-group"><label>Full Name</label><input type="text" id="regName" placeholder="Samruddhi Shende"/></div>
        <div class="form-group"><label>Email</label><input type="email" id="regEmail" placeholder="you@example.com"/></div>
        <div class="form-group"><label>Password</label><input type="password" id="regPwd" placeholder="Min 6 characters"/></div>
        <div class="form-group">
          <label>I am an…</label>
          <select id="regRole"><option value="attendee">Attendee</option><option value="organizer">Organizer</option></select>
        </div>
        <button class="btn btn-primary" style="width:100%" onclick="register()">Create Account</button>
      </div>
    </div>
  </div>

  <!-- ── My Registrations ───────────────────────────── -->
  <div id="page-my" class="page">
    <h2 style="margin-bottom:20px">My Registrations</h2>
    <div id="myRegList"><div class="spinner">Loading…</div></div>
  </div>

  <!-- ── Organizer / Admin Panel ────────────────────── -->
  <div id="page-panel" class="page">
    <div class="panel-header">
      <h2>Organizer Panel</h2>
      <button class="btn btn-primary btn-sm" onclick="showCreateEvent()">+ New Event</button>
    </div>
    <div class="stat-row" id="panelStats"></div>

    <!-- Create/Edit form -->
    <div id="eventFormWrap" style="display:none">
      <div class="card" style="margin-bottom:24px">
        <h3 style="margin-bottom:20px" id="eventFormTitle">Create New Event</h3>
        <div id="eventFormAlert"></div>
        <div class="form-group"><label>Title</label><input type="text" id="evTitle"/></div>
        <div class="form-group"><label>Description</label><textarea id="evDesc"></textarea></div>
        <div class="form-row">
          <div class="form-group"><label>Location</label><input type="text" id="evLoc"/></div>
          <div class="form-group"><label>Category</label>
            <select id="evCat"><option>Technology</option><option>Education</option><option>Networking</option><option>General</option></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Date & Time</label><input type="datetime-local" id="evDate"/></div>
          <div class="form-group"><label>Capacity</label><input type="number" id="evCap" value="100" min="1"/></div>
        </div>
        <div class="form-group"><label>Price (₹, 0 = free)</label><input type="number" id="evPrice" value="0" min="0"/></div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-primary" onclick="submitEvent()">Save Event</button>
          <button class="btn btn-outline" onclick="cancelEventForm()">Cancel</button>
        </div>
      </div>
    </div>

    <div id="myEventsList"></div>
  </div>
</main>

<script>
const API = "/api";
let token = localStorage.getItem("er_token");
let currentUser = JSON.parse(localStorage.getItem("er_user") || "null");
let allEvents = [];
let editingEventId = null;

// ── Auth helpers ──────────────────────────────────────────────────────────────
function authHeaders() {
  return { "Content-Type": "application/json", ...(token ? { Authorization: `Bearer ${token}` } : {}) };
}

async function apiFetch(url, opts = {}) {
  const res = await fetch(API + url, { headers: authHeaders(), ...opts });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "Request failed");
  return data;
}

// ── Pages ─────────────────────────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("page-" + name).classList.add("active");
  if (name === "events")  { loadEvents(); }
  if (name === "my")      { loadMyRegistrations(); }
  if (name === "panel")   { loadPanel(); }
}

// ── Nav ───────────────────────────────────────────────────────────────────────
function renderNav() {
  const el = document.getElementById("authNav");
  if (!currentUser) {
    el.innerHTML = `<button class="btn btn-primary btn-sm" onclick="showPage('auth')">Login / Register</button>`;
    return;
  }
  let extra = "";
  if (currentUser.role === "organizer" || currentUser.role === "admin")
    extra = `<button class="nav-btn" onclick="showPage('panel')">My Events</button>`;
  el.innerHTML = `
    <button class="nav-btn" onclick="showPage('my')">My Tickets</button>
    ${extra}
    <span style="font-size:0.8rem;color:var(--muted);padding:0 8px">${currentUser.name}</span>
    <button class="nav-btn" onclick="logout()">Logout</button>
  `;
}

// ── Events list ───────────────────────────────────────────────────────────────
async function loadEvents() {
  try {
    allEvents = await apiFetch("/events?upcoming=true");
    renderEvents(allEvents);
  } catch { document.getElementById("eventGrid").innerHTML = `<div class="empty">Could not load events.</div>`; }
}

function categoryBadge(cat) {
  const map = { Technology:"badge-tech", Education:"badge-edu", Networking:"badge-net" };
  return `<span class="badge ${map[cat]||'badge-gen'}">${cat}</span>`;
}

function renderEvents(list) {
  const grid = document.getElementById("eventGrid");
  if (!list.length) { grid.innerHTML = `<div class="empty">No events found.</div>`; return; }
  grid.innerHTML = list.map(e => `
    <div class="event-card" onclick="showDetail('${e.id}')">
      <div class="event-card-body">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
          ${categoryBadge(e.category)}
          <span class="price-tag">${e.price > 0 ? "₹" + e.price : "FREE"}</span>
        </div>
        <h3>${e.title}</h3>
        <div class="meta">
          <span>📅 ${new Date(e.event_date).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"})}</span>
          <span>📍 ${e.location}</span>
          <span>👤 by ${e.organizer_name}</span>
        </div>
        <p style="font-size:0.82rem;color:var(--muted);line-height:1.5">${e.description.slice(0,100)}${e.description.length>100?"…":""}</p>
      </div>
      <div class="event-card-footer">
        <span class="spots ${e.spots_left < 10 ? 'danger' : ''}">${e.is_full ? "FULL" : e.spots_left + " spots left"}</span>
        <button class="btn btn-primary btn-sm">View →</button>
      </div>
    </div>
  `).join("");
}

function filterEvents() {
  const q   = document.getElementById("searchInput").value.toLowerCase();
  const cat = document.getElementById("catFilter").value;
  const up  = document.getElementById("upcomingOnly").checked;
  const now = new Date();
  renderEvents(allEvents.filter(e =>
    (!q  || e.title.toLowerCase().includes(q) || e.description.toLowerCase().includes(q)) &&
    (!cat || e.category === cat) &&
    (!up  || new Date(e.event_date) >= now)
  ));
}

// ── Event detail ──────────────────────────────────────────────────────────────
async function showDetail(id) {
  showPage("detail");
  const c = document.getElementById("detailContent");
  c.innerHTML = `<div class="spinner">Loading…</div>`;
  try {
    const e = await apiFetch(`/events/${id}`);
    const regCheck = currentUser ? await apiFetch("/registrations/my").catch(()=>[]) : [];
    const myReg = regCheck.find(r => r.event_id === id && r.status === "confirmed");

    const dateStr = new Date(e.event_date).toLocaleString("en-IN",{dateStyle:"long",timeStyle:"short"});

    c.innerHTML = `
      <div class="detail-header">
        <div style="margin-bottom:10px">${categoryBadge(e.category)}</div>
        <h1>${e.title}</h1>
        <div class="detail-meta">
          <span>📅 ${dateStr}</span>
          <span>📍 ${e.location}</span>
          <span>👤 Organizer: ${e.organizer_name}</span>
          <span>👥 ${e.registered_count}/${e.capacity} registered</span>
        </div>
      </div>
      <div class="detail-body">
        <div>
          <h3 style="margin-bottom:12px">About this Event</h3>
          <p style="line-height:1.7;color:var(--muted);font-size:0.9rem">${e.description}</p>
        </div>
        <div class="sidebar-card">
          <div class="price-big">${e.price > 0 ? "₹" + e.price : "FREE"}</div>
          <div style="font-size:0.82rem;color:var(--muted);margin-bottom:16px">
            ${e.is_full ? "⛔ Event is fully booked" : `✅ ${e.spots_left} spots remaining`}
          </div>
          <div id="regAction">
            ${getRegAction(e, myReg)}
          </div>
        </div>
      </div>
    `;
    window._currentEvent = e;
    window._myReg = myReg;
  } catch(err) { c.innerHTML = `<div class="empty">Event not found.</div>`; }
}

function getRegAction(e, myReg) {
  if (!currentUser)
    return `<button class="btn btn-primary" style="width:100%" onclick="showPage('auth')">Login to Register</button>`;
  if (myReg)
    return `
      <div class="alert alert-success">✅ You're registered!</div>
      <button class="btn btn-danger" style="width:100%" onclick="cancelReg('${myReg.registration_id}')">Cancel Registration</button>`;
  if (e.is_full)
    return `<button class="btn btn-outline" style="width:100%" disabled>Event Full</button>`;
  if (new Date(e.event_date) < new Date())
    return `<button class="btn btn-outline" style="width:100%" disabled>Event Ended</button>`;
  return `<button class="btn btn-primary" style="width:100%" onclick="registerEvent('${e.id}')">Register Now</button>`;
}

async function registerEvent(eventId) {
  try {
    await apiFetch("/registrations", { method:"POST", body: JSON.stringify({ event_id: eventId }) });
    showDetail(eventId);
  } catch(err) { alert(err.message); }
}

async function cancelReg(regId) {
  if (!confirm("Cancel this registration?")) return;
  try {
    await apiFetch(`/registrations/${regId}`, { method:"DELETE" });
    showDetail(window._currentEvent.id);
  } catch(err) { alert(err.message); }
}

// ── My Registrations ──────────────────────────────────────────────────────────
async function loadMyRegistrations() {
  if (!currentUser) { showPage("auth"); return; }
  const el = document.getElementById("myRegList");
  try {
    const regs = await apiFetch("/registrations/my");
    if (!regs.length) { el.innerHTML = `<div class="empty">No registrations yet. <a href="#" onclick="showPage('events')">Browse events</a></div>`; return; }
    el.innerHTML = `<div style="display:flex;flex-direction:column;gap:12px">${regs.map(r => `
      <div class="reg-item">
        <div class="reg-info">
          <h4>${r.title}</h4>
          <div class="sub">📅 ${new Date(r.event_date).toLocaleString("en-IN",{dateStyle:"medium",timeStyle:"short"})}</div>
          <div class="sub">📍 ${r.location}</div>
          <div class="sub" style="margin-top:6px">
            <span class="status-pill status-${r.status}">${r.status}</span>
            ${r.price > 0 ? `<span style="margin-left:8px;color:var(--accent2)">₹${r.price}</span>` : ""}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <button class="btn btn-outline btn-sm" onclick="showDetail('${r.event_id}')">View</button>
          ${r.status === "confirmed" ? `<button class="btn btn-danger btn-sm" onclick="cancelReg('${r.registration_id}')">Cancel</button>` : ""}
        </div>
      </div>
    `).join("")}</div>`;
  } catch { el.innerHTML = `<div class="empty">Could not load registrations.</div>`; }
}

// ── Organizer Panel ───────────────────────────────────────────────────────────
async function loadPanel() {
  if (!currentUser || (currentUser.role !== "organizer" && currentUser.role !== "admin")) {
    showPage("auth"); return;
  }

  // Stats (admin only)
  const statsEl = document.getElementById("panelStats");
  if (currentUser.role === "admin") {
    try {
      const s = await apiFetch("/admin/stats");
      statsEl.innerHTML = [
        { num: s.total_users, lbl: "Total Users" },
        { num: s.total_events, lbl: "Total Events" },
        { num: s.total_registrations, lbl: "Registrations" },
        { num: s.upcoming_events, lbl: "Upcoming" },
      ].map(x => `<div class="stat-box"><div class="num">${x.num}</div><div class="lbl">${x.lbl}</div></div>`).join("");
    } catch {}
  } else { statsEl.innerHTML = ""; }

  // My events
  const listEl = document.getElementById("myEventsList");
  try {
    const events = currentUser.role === "admin"
      ? await apiFetch("/admin/events")
      : (await apiFetch("/events")).filter(e => e.organizer_id === currentUser.id
          || (allEvents.find(x=>x.id===e.id)));

    // For organizer: filter only their events by fetching all and matching
    const myEvents = currentUser.role === "admin"
      ? events
      : (await apiFetch("/events?upcoming=false")).filter(e => e.organizer_id === currentUser.id)
          .concat(await apiFetch("/events").then(list => list.filter(e => e.organizer_id === currentUser.id)));

    const dedupedEvents = currentUser.role === "admin" ? events :
      (await apiFetch("/events")).filter(e => e.organizer_id === currentUser.id);

    if (!dedupedEvents.length) { listEl.innerHTML = `<div class="empty">You haven't created any events yet.</div>`; return; }

    listEl.innerHTML = `
      <table>
        <thead><tr><th>Title</th><th>Date</th><th>Registrations</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>${dedupedEvents.map(e => `
          <tr>
            <td>${e.title}</td>
            <td>${new Date(e.event_date).toLocaleDateString("en-IN")}</td>
            <td>${e.registered_count || 0}/${e.capacity}</td>
            <td><span class="status-pill ${e.status==="published"?"status-confirmed":"status-cancelled"}">${e.status}</span></td>
            <td>
              <button class="btn btn-outline btn-sm" onclick="editEvent(${JSON.stringify(e).replace(/"/g,"&quot;")})">Edit</button>
              <button class="btn btn-danger btn-sm" onclick="cancelEvent('${e.id}')">Cancel</button>
            </td>
          </tr>
        `).join("")}</tbody>
      </table>`;
  } catch(e) { listEl.innerHTML = `<div class="empty">Could not load events.</div>`; }
}

function showCreateEvent() {
  editingEventId = null;
  document.getElementById("eventFormTitle").textContent = "Create New Event";
  ["evTitle","evDesc","evLoc"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("evCap").value = 100;
  document.getElementById("evPrice").value = 0;
  document.getElementById("eventFormWrap").style.display = "block";
}

function editEvent(e) {
  editingEventId = e.id;
  document.getElementById("eventFormTitle").textContent = "Edit Event";
  document.getElementById("evTitle").value = e.title;
  document.getElementById("evDesc").value = e.description;
  document.getElementById("evLoc").value = e.location;
  document.getElementById("evCat").value = e.category;
  document.getElementById("evDate").value = e.event_date.replace(" ","T").slice(0,16);
  document.getElementById("evCap").value = e.capacity;
  document.getElementById("evPrice").value = e.price;
  document.getElementById("eventFormWrap").style.display = "block";
  document.getElementById("eventFormWrap").scrollIntoView({behavior:"smooth"});
}

function cancelEventForm() {
  document.getElementById("eventFormWrap").style.display = "none";
  editingEventId = null;
}

async function submitEvent() {
  const body = {
    title:       document.getElementById("evTitle").value,
    description: document.getElementById("evDesc").value,
    location:    document.getElementById("evLoc").value,
    category:    document.getElementById("evCat").value,
    event_date:  document.getElementById("evDate").value,
    capacity:    +document.getElementById("evCap").value,
    price:       +document.getElementById("evPrice").value,
  };
  const alertEl = document.getElementById("eventFormAlert");
  try {
    if (editingEventId) {
      await apiFetch(`/events/${editingEventId}`, { method:"PUT", body:JSON.stringify(body) });
    } else {
      await apiFetch("/events", { method:"POST", body:JSON.stringify(body) });
    }
    cancelEventForm();
    loadPanel();
  } catch(err) {
    alertEl.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
  }
}

async function cancelEvent(id) {
  if (!confirm("Cancel this event? All registrations will be notified.")) return;
  try { await apiFetch(`/events/${id}`, { method:"DELETE" }); loadPanel(); }
  catch(err) { alert(err.message); }
}

// ── Auth ──────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById("loginForm").style.display    = tab==="login"    ? "block" : "none";
  document.getElementById("registerForm").style.display = tab==="register" ? "block" : "none";
  document.getElementById("tabLogin").classList.toggle("active", tab==="login");
  document.getElementById("tabReg").classList.toggle("active", tab==="register");
  document.getElementById("authAlert").innerHTML = "";
}

function setAuthAlert(msg, type="error") {
  document.getElementById("authAlert").innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
}

async function login() {
  try {
    const data = await apiFetch("/auth/login", {
      method:"POST",
      body: JSON.stringify({ email: document.getElementById("loginEmail").value, password: document.getElementById("loginPwd").value })
    });
    token = data.token; currentUser = data.user;
    localStorage.setItem("er_token", token);
    localStorage.setItem("er_user", JSON.stringify(currentUser));
    renderNav(); showPage("events");
  } catch(err) { setAuthAlert(err.message); }
}

async function register() {
  try {
    const data = await apiFetch("/auth/register", {
      method:"POST",
      body: JSON.stringify({
        name:     document.getElementById("regName").value,
        email:    document.getElementById("regEmail").value,
        password: document.getElementById("regPwd").value,
        role:     document.getElementById("regRole").value,
      })
    });
    token = data.token; currentUser = data.user;
    localStorage.setItem("er_token", token);
    localStorage.setItem("er_user", JSON.stringify(currentUser));
    renderNav(); showPage("events");
  } catch(err) { setAuthAlert(err.message); }
}

function logout() {
  token = null; currentUser = null;
  localStorage.removeItem("er_token"); localStorage.removeItem("er_user");
  renderNav(); showPage("events");
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderNav();
loadEvents();
</script>
</body>
</html>
